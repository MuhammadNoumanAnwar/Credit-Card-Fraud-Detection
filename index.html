<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Fraud Detection</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="container">
    <div class="title-ribbon">
        <h1 class="fancy-title">Credit Card Fraud Detection</h1>
    </div>
    <form action="/predict" method="POST">
        <div class="form-row">
            <div class="field">
                <label for="amount">Amount Withdrawn (£):</label>
                <input type="number" step="0.01" id="amount" name="amount"
                       placeholder="Enter amount" required min="0"
                       value="{{ request.form.amount if request.form.amount }}">
            </div>
            <div class="field">
                <label for="time">Time (Seconds):</label>
                <input type="number" id="time" name="time"
                       placeholder="Enter transaction time" required min="0"
                       value="{{ request.form.time if request.form.time }}">
            </div>
        </div>
        <div class="form-row">
            <div class="field">
                <label for="transaction_type">Type of Transaction:</label>
                <select id="transaction_type" name="transaction_type" required>
                    <option value="Online" {% if request.form.transaction_type == 'Online' %}selected{% endif %}>Online</option>
                    <option value="POS" {% if request.form.transaction_type == 'POS' %}selected{% endif %}>POS</option>
                    <option value="ATM" {% if request.form.transaction_type == 'ATM' %}selected{% endif %}>ATM</option>
                </select>
            </div>
            <div class="field">
                <label for="entry_mode">Entry Mode:</label>
                <select id="entry_mode" name="entry_mode" required>
                    <option value="Chip" {% if request.form.entry_mode == 'Chip' %}selected{% endif %}>Chip</option>
                    <option value="Swipe" {% if request.form.entry_mode == 'Swipe' %}selected{% endif %}>Swipe</option>
                    <option value="Contactless" {% if request.form.entry_mode == 'Contactless' %}selected{% endif %}>Contactless</option>
                    <option value="Online" {% if request.form.entry_mode == 'Online' %}selected{% endif %}>Online</option>
                </select>
            </div>
        </div>
        <div class="form-row single-field">
            <div class="field">
                <label for="country">Country of Transaction:</label>
                <select id="country" name="country" required>
                    <option value="India" {% if request.form.country == 'India' %}selected{% endif %}>India</option>
                    <option value="USA" {% if request.form.country == 'USA' %}selected{% endif %}>USA</option>
                    <option value="UK" {% if request.form.country == 'UK' %}selected{% endif %}>UK</option>
                    <option value="Canada" {% if request.form.country == 'Canada' %}selected{% endif %}>Canada</option>
                    <option value="Germany" {% if request.form.country == 'Germany' %}selected{% endif %}>Germany</option>
                </select>
            </div>
        </div>
        <button type="submit">Predict</button>
    </form>
    {% if pred %}
    <div class="result"
        data-fraud="{{ fraud_prob }}"
        data-safe="{{ safe_prob }}"
        data-feature='{{ feature_contributions|tojson|safe }}'>
        <h3 class="{% if pred == 'Fraud' %}fraud{% else %}safe{% endif %}">
            {{ pred }}
        </h3>
        <p>Fraud Probability: <strong>{{ fraud_prob }}%</strong></p>
        <div class="progress-bar">
            <div class="progress fraud-bar" id="fraudBar"></div>
        </div>
        <p>Not Fraud Probability: <strong>{{ safe_prob }}%</strong></p>
        <div class="progress-bar">
            <div class="progress safe-bar" id="safeBar"></div>
        </div>
        <canvas id="probChart" class="chart"></canvas>
        <h4>Feature Contribution</h4>
        <canvas id="featureChart" class="chart"></canvas>
    </div>
    <script>
        const resultBox = document.querySelector('.result');
        const fraudProb = parseFloat(resultBox.dataset.fraud);
        const safeProb = parseFloat(resultBox.dataset.safe);
        document.getElementById('fraudBar').style.width = fraudProb + '%';
        document.getElementById('safeBar').style.width = safeProb + '%';
        const ctx = document.getElementById('probChart').getContext('2d');
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Fraud', 'Not Fraud'],
                datasets: [{
                    data: [fraudProb, safeProb],
                    backgroundColor: ['#ef4444', '#22c55e']
                }]
            },
            options: {
                plugins: {
                    legend: { position: 'bottom' }
                }
            }
        });
        const features = Object.keys(JSON.parse(resultBox.dataset.feature));
        const contributions = Object.values(JSON.parse(resultBox.dataset.feature));
        const ctxFeature = document.getElementById('featureChart').getContext('2d');
        new Chart(ctxFeature, {
            type: 'bar',
            data: {
                labels: features,
                datasets: [{
                    label: 'Contribution',
                    data: contributions,
                    backgroundColor: ['#ef4444','#f97316','#facc15','#22c55e','#3b82f6']
                }]
            },
            options: {
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return (context.raw * 100).toFixed(1) + '%';
                            }
                        }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 1
                    }
                }
            }
        });
    </script>
    {% endif %}
    <div class="footer">© 2025 Fraud Detection</div>
</div>
</body>
</html>
